<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <h3 class="mt-2 fw-bold">Recuperar contraseña</h3>
        </div>
        <form (ngSubmit)="enviarLink()">
          <div class="form-group mb-4" >
            <label for="email">Correo Electrónico</label>
          <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input
                id="email"
                type="email"
                class="form-control"
                [(ngModel)]="email"
                name="email"
                required
                email
                placeholder="ejemplo@correo.com"
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100" >Enviar link</button>
        </form>
        <p *ngIf="mensajeEnviado">
          Si el email existe en nuestro sistema, recibirás un link de recuperación en unos minutos.
        </p>
      </div>
    </div>
  </div>
</div>
