<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        @if (success()) {
          <div class="text-center">
            <div class="alert alert-success d-flex flex-column align-items-center py-4" role="alert">
              <i class="bi bi-check-circle-fill" style="font-size: 3rem; color: #10b981"></i>
              <h4 class="mt-3 fw-bold">¡Contraseña restablecida!</h4>
              <p class="mb-0 mt-2">Tu contraseña se actualizó correctamente.</p>
              <p class="text-muted small mt-2">Redirigiendo al login...</p>
            </div>
          </div>
        } @else {
          <div class="text-center mb-4">
            <i class="bi bi-key display-5" style="color: var(--primary)"></i>
            <h3 class="mt-2 fw-bold">Nueva contraseña</h3>
          </div>

          @if (invalidToken()) {
            <div class="alert alert-danger d-flex align-items-center" role="alert">
              <i class="bi bi-exclamation-triangle me-2"></i>
              {{ error() }}
            </div>
            <a routerLink="/forgot-password" class="btn btn-primary w-100">
              Solicitar nuevo enlace
            </a>
          } @else {
            @if (error()) {
              <div class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                {{ error() }}
              </div>
            }

            <form (ngSubmit)="submit()" #form="ngForm">
              <div class="mb-3">
                <label for="password" class="form-label fw-medium">Nueva contraseña (mín. 8 caracteres)</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input
                    id="password"
                    type="password"
                    class="form-control"
                    [(ngModel)]="password"
                    name="password"
                    required
                    minlength="8"
                    placeholder="••••••••"
                  />
                </div>
              </div>

              <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-medium">Confirmar contraseña</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                  <input
                    id="confirmPassword"
                    type="password"
                    class="form-control"
                    [(ngModel)]="confirmPassword"
                    name="confirmPassword"
                    required
                    placeholder="••••••••"
                  />
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading()">
                @if (loading()) {
                  <span class="spinner-border spinner-border-sm me-1" role="status"></span>
                }
                Restablecer contraseña
              </button>
            </form>
          }

          <p class="mt-4 text-center text-muted mb-0">
            <a routerLink="/login"><i class="bi bi-arrow-left me-1"></i>Volver al Login</a>
          </p>
        }
      </div>
    </div>
  </div>
</div>
