<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <div class="card shadow-sm p-5">
      @if (loading()) {
        <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
        <h4 class="fw-bold">Verificando tu correo...</h4>
        <p class="text-muted">Por favor, esperá un momento.</p>
      } @else {
        <i class="bi bi-check-circle text-success mb-3" style="font-size: 4rem;"></i>
        <h4 class="fw-bold">¡Listo!</h4>
        <p class="text-muted">Ya podés iniciar sesión en tu cuenta.</p>
        <a routerLink="/login" class="btn btn-primary mt-3">Ir al Login</a>
      }
    </div>
  </div>
</div>
